<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urker Woordenboek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .stripe-band {
      display: block;
      width: 100%;
      line-height: 0;
    }

    .stripe-band svg {
      display: block;
      width: 100%;
    }

    header {
      background: linear-gradient(135deg, #0d3b6e 0%, #1565a8 60%, #1e90c3 100%);
      color: white;
      padding: 2rem 1.5rem 1.75rem;
      text-align: center;
      box-shadow: 0 4px 16px rgba(13,59,110,0.3);
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.82;
    }

    .wave {
      display: block;
      width: 100%;
      height: 28px;
      background: #f0f4f8;
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    main {
      flex: 1;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      align-items: stretch;
    }

    .search-wrap {
      position: relative;
      flex: 1;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7a90;
      pointer-events: none;
    }

    #search {
      width: 100%;
      height: 100%;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      font-size: 1rem;
      border: 2px solid #c9d6e3;
      border-radius: 9px;
      background: white;
      color: #1a2332;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #search:focus {
      border-color: #1565a8;
      box-shadow: 0 0 0 3px rgba(21,101,168,0.14);
    }

    .mode-group {
      display: flex;
      border: 2px solid #c9d6e3;
      border-radius: 9px;
      overflow: hidden;
      background: white;
    }

    .mode-btn {
      flex: 1;
      padding: 0 0.85rem;
      font-size: 0.82rem;
      font-weight: 600;
      background: white;
      border: none;
      border-right: 1px solid #c9d6e3;
      color: #6b7a90;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn:last-child { border-right: none; }
    .mode-btn:hover { background: #f0f4f8; color: #1565a8; }
    .mode-btn.active { background: #1565a8; color: white; }

    .letters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }

    .letter-btn {
      padding: 0.28rem 0.55rem;
      font-size: 0.82rem;
      font-weight: 600;
      border: 2px solid #c9d6e3;
      border-radius: 6px;
      background: white;
      color: #4a5568;
      cursor: pointer;
      min-width: 30px;
      text-align: center;
      transition: all 0.15s;
    }

    .letter-btn:hover { border-color: #1565a8; color: #1565a8; }
    .letter-btn.active { background: #1565a8; border-color: #1565a8; color: white; }

    .count-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0;
      margin-bottom: 0.75rem;
      font-size: 0.88rem;
      color: #4a5568;
    }

    #count { font-weight: 600; color: #1565a8; }

    #reset-btn {
      font-size: 0.85rem;
      background: none;
      border: none;
      color: #1565a8;
      cursor: pointer;
      text-decoration: underline;
    }

    #word-grid {
      columns: 3;
      column-gap: 0.6rem;
    }

    @media (max-width: 600px) {
      #word-grid { columns: 2; }
      .mode-btn { padding: 0 0.5rem; font-size: 0.75rem; }
    }

    .word-item {
      break-inside: avoid;
      background: white;
      border: 1.5px solid #dde4ef;
      border-radius: 7px;
      padding: 0.45rem 0.8rem;
      margin-bottom: 0.45rem;
      font-size: 0.93rem;
      color: #0d3b6e;
      font-weight: 500;
      display: block;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    .word-item:hover {
      border-color: #1565a8;
      box-shadow: 0 2px 6px rgba(21,101,168,0.1);
    }

    mark {
      background: #fde68a;
      border-radius: 2px;
      padding: 0 1px;
    }

    #empty {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: #6b7a90;
    }

    #empty svg {
      opacity: 0.3;
      margin-bottom: 0.75rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    footer {
      text-align: center;
      padding: 1rem 1rem 1.25rem;
      font-size: 0.8rem;
      color: #9aa5b4;
      background: #e8edf4;
    }
  </style>
</head>
<body>

<div class="stripe-band"><svg xmlns="http://www.w3.org/2000/svg" width="100%" height="20" preserveAspectRatio="none">
  <rect y="0"    width="100%" height="4.5" fill="#e2001a"/>
  <rect y="4.5"  width="100%" height="1"   fill="#ffffff"/>
  <rect y="5.5"  width="100%" height="4.5" fill="#e2001a"/>
  <rect y="10"   width="100%" height="3"   fill="#ffffff"/>
  <rect y="13"   width="100%" height="1.5" fill="#1a171b"/>
  <rect y="14.5" width="100%" height="1"   fill="#ffffff"/>
  <rect y="15.5" width="100%" height="1.5" fill="#1a171b"/>
  <rect y="17"   width="100%" height="3"   fill="#ffffff"/>
</svg></div>

<header>
  <h1>Urker Woordenboek</h1>
  <p>Woorden in het Urker dialect</p>
</header>
<span class="wave" aria-hidden="true"></span>

<main>
  <div class="search-row">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search" placeholder="Zoek een woord&#x2026;" autocomplete="off" autofocus />
    </div>
    <div class="mode-group">
      <button class="mode-btn" data-mode="bevat">Bevat</button>
      <button class="mode-btn active" data-mode="begint">Begint met</button>
      <button class="mode-btn" data-mode="eindigt">Eindigt op</button>
    </div>
  </div>

  <div class="letters" id="letters"></div>

  <div class="count-bar">
    <span><span id="count">0</span> woorden</span>
    <button id="reset-btn" style="display:none">Wis filter</button>
  </div>

  <div id="word-grid"></div>
  <div id="empty">
    <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p>Geen woorden gevonden voor &#x201C;<span id="empty-query"></span>&#x201D;</p>
  </div>
</main>

<footer>
  <div class="stripe-band" style="margin-bottom:0.85rem"><svg xmlns="http://www.w3.org/2000/svg" width="100%" height="20" preserveAspectRatio="none">
  <rect y="0"    width="100%" height="4.5" fill="#e2001a"/>
  <rect y="4.5"  width="100%" height="1"   fill="#ffffff"/>
  <rect y="5.5"  width="100%" height="4.5" fill="#e2001a"/>
  <rect y="10"   width="100%" height="3"   fill="#ffffff"/>
  <rect y="13"   width="100%" height="1.5" fill="#1a171b"/>
  <rect y="14.5" width="100%" height="1"   fill="#ffffff"/>
  <rect y="15.5" width="100%" height="1.5" fill="#1a171b"/>
  <rect y="17"   width="100%" height="3"   fill="#ffffff"/>
</svg></div>
  Urker taalschat &mdash; 5,803 woorden
</footer>

<script>
let WORDS = [];

const searchInput = document.getElementById('search');
const countEl     = document.getElementById('count');
const emptyEl     = document.getElementById('empty');
const emptyQuery  = document.getElementById('empty-query');
const resetBtn    = document.getElementById('reset-btn');
const lettersEl   = document.getElementById('letters');
const grid        = document.getElementById('word-grid');

let activeLetter = null;
let activeMode   = 'begint';

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeMode = btn.dataset.mode;
    render();
  });
});

const letters = [...new Set(WORDS.map(w => w[0].toUpperCase()))].sort();
letters.forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'letter-btn';
  btn.textContent = l;
  btn.addEventListener('click', () => {
    if (activeLetter === l) {
      activeLetter = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('.letter-btn.active').forEach(b => b.classList.remove('active'));
      activeLetter = l;
      btn.classList.add('active');
    }
    searchInput.value = '';
    render();
  });
  lettersEl.appendChild(btn);
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(word, q, mode) {
  if (!q) return escHtml(word);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  let re;
  if (mode === 'begint')  re = new RegExp(`^(${safe})`, 'i');
  else if (mode === 'eindigt') re = new RegExp(`(${safe})$`, 'i');
  else re = new RegExp(`(${safe})`, 'gi');
  return escHtml(word).replace(re, '<mark>$1</mark>');
}

function matches(word, q, mode) {
  if (!q) return true;
  const w = word.toLowerCase(), s = q.toLowerCase();
  if (mode === 'begint')  return w.startsWith(s);
  if (mode === 'eindigt') return w.endsWith(s);
  return w.includes(s);
}

function render() {
  const q = searchInput.value.trim();
  const filtered = WORDS.filter(w => {
    const lm = !activeLetter || w[0].toUpperCase() === activeLetter;
    return lm && matches(w, q, activeMode);
  });

  countEl.textContent = filtered.length.toLocaleString('nl-NL');
  resetBtn.style.display = (q || activeLetter) ? 'inline' : 'none';
  emptyEl.style.display  = filtered.length === 0 ? 'block' : 'none';
  grid.style.display     = filtered.length === 0 ? 'none' : 'block';
  emptyQuery.textContent = q || activeLetter || '';

  grid.innerHTML = filtered
    .map(w => `<span class="word-item">${highlight(w, q, activeMode)}</span>`)
    .join('');
}

searchInput.addEventListener('input', () => {
  if (searchInput.value) {
    activeLetter = null;
    document.querySelectorAll('.letter-btn.active').forEach(b => b.classList.remove('active'));
  }
  render();
});

resetBtn.addEventListener('click', () => {
  searchInput.value = '';
  activeLetter = null;
  document.querySelectorAll('.letter-btn.active').forEach(b => b.classList.remove('active'));
  render();
});

fetch('words.json')
  .then(r => r.json())
  .then(data => {
    WORDS = data;
    render();
  })
  .catch(() => {
    grid.innerHTML = '<p style="color:#c62828;padding:1rem">Kon words.json niet laden.</p>';
  });
</script>
</body>
</html>
